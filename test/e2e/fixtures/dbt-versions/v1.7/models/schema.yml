version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: orders
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: user_id
            tests:
              - not_null
          - name: order_date
            tests:
              - not_null
          - name: status
            tests:
              - accepted_values:
                  values: ['placed', 'shipped', 'completed', 'returned', 'cancelled']
      - name: payments
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: order_id
            tests:
              - not_null

models:
  - name: stg_orders
    description: "Staged orders from raw source"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'returned', 'cancelled']

  - name: fct_orders
    description: "Fact table for orders with payment totals"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: order_total
        description: "Total payment amount for the order"
        tests:
          - not_null
