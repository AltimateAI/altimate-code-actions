name: Pre-Release

on:
  push:
    branches: ["release/*"]

concurrency:
  group: pre-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Format check
        run: bun run format:check

      - name: Unit tests
        run: bun test test/unit/

  e2e:
    name: E2E (dbt ${{ matrix.dbt-version }}, py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [ci]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        dbt-version: ["1.7.0", "1.8.0", "1.9.0"]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==${{ matrix.dbt-version }}" dbt-duckdb

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run E2E tests
        run: bun test test/e2e/
        env:
          DBT_VERSION: ${{ matrix.dbt-version }}

  tag-rc:
    name: Tag Release Candidate
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine RC tag
        id: rc
        run: |
          # Extract version from branch name (release/1.2.0 -> 1.2.0)
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          # Count existing RC tags for this version
          RC_COUNT=$(git tag -l "v${BRANCH}-rc.*" | wc -l | tr -d ' ')
          NEXT_RC=$((RC_COUNT + 1))
          TAG="v${BRANCH}-rc.${NEXT_RC}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Will create tag: $TAG"

      - name: Create RC tag
        run: |
          TAG="${{ steps.rc.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.rc.outputs.tag }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --prerelease \
            --title "$TAG"
