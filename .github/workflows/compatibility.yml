name: Compatibility Check

on:
  schedule:
    # Weekly on Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compatibility:
    name: Latest CLI Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        dbt-version: ["1.7.0", "1.8.0", "1.9.0"]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==${{ matrix.dbt-version }}" dbt-duckdb

      - name: Install latest altimate-code CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/AltimateAI/altimate-code/main/install.sh | bash
        env:
          ALTIMATE_CODE_INSTALL_DIR: /usr/local/bin

      - name: Print CLI version
        run: altimate-code --version || echo "version flag not available"

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run E2E tests
        id: tests
        run: bun test test/e2e/
        env:
          DBT_VERSION: ${{ matrix.dbt-version }}

  create-issue-on-failure:
    name: Report Failure
    runs-on: ubuntu-latest
    needs: [compatibility]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create issue for compatibility failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open issue already exists
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "compatibility" \
            --state open \
            --json number \
            --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open compatibility issue already exists, skipping creation"
            exit 0
          fi

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Compatibility failure with latest altimate-code CLI ($(date -u +%F))" \
            --label "bug,compatibility" \
            --body "$(cat <<'EOF'
          ## Compatibility Check Failed

          The weekly compatibility check against the latest `altimate-code` CLI has failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Date:** $(date -u +%FT%TZ)

          ### Next Steps
          1. Check the failing workflow run for details
          2. Identify which CLI changes broke compatibility
          3. Update the action to work with the latest CLI
          4. Re-run the compatibility check to verify
          EOF
          )"
