name: Bug Report
description: Report a bug with altimate-code-actions
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I run the action with mode 'static', it fails with...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Create a workflow with the following config...
        2. Push a PR with a SQL change...
        3. Observe the error in the action logs...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or logs.
    validations:
      required: true

  - type: input
    id: action-version
    attributes:
      label: Action version
      description: "Which version of the action are you using? (e.g., v1, v1.2.0, main)"
      placeholder: "v1"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Action mode
      description: Which mode were you running?
      options:
        - static
        - ai
        - both
        - not applicable
    validations:
      required: true

  - type: input
    id: dbt-version
    attributes:
      label: dbt version
      description: "Which dbt version are you using? (e.g., 1.8.0)"
      placeholder: "1.8.0"
    validations:
      required: false

  - type: dropdown
    id: runner
    attributes:
      label: Runner OS
      description: Which GitHub Actions runner are you using?
      options:
        - ubuntu-latest
        - ubuntu-22.04
        - ubuntu-24.04
        - macos-latest
        - windows-latest
        - self-hosted
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Workflow file
      description: Paste the relevant portion of your workflow YAML.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Action logs
      description: Paste any relevant log output from the action run.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other relevant information (screenshots, links to failed runs, etc.)
    validations:
      required: false
