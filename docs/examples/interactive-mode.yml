# Interactive Mode
#
# Responds to @altimate mentions in PR comments. When a developer comments
# "@altimate review this" (or just "@altimate"), the action runs a full
# review and posts the results.
#
# This workflow runs in addition to your automatic review workflow.
# It lets developers request on-demand reviews at any time.
#
# Prerequisites:
# - ANTHROPIC_API_KEY secret for AI-powered review
#
# Copy this file to .github/workflows/altimate-interactive.yml in your repository.

name: Altimate Interactive

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Altimate Interactive Review
    # Only run when a PR comment contains the trigger phrase
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@altimate')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: AltimateAI/altimate-code-actions@v0
        with:
          interactive: true
          mentions: "@altimate,@alt"
          mode: full
          model: anthropic/claude-sonnet-4-20250514
          impact_analysis: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
