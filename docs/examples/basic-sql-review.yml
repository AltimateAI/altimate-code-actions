# Basic SQL Review
#
# Static analysis only — no API keys or warehouse credentials required.
# Detects anti-patterns, style issues, and potential bugs in SQL files.
#
# Copy this file to .github/workflows/altimate-review.yml in your repository.

name: SQL Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Altimate SQL Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: AltimateAI/altimate-code-actions@v0
        id: review
        with:
          mode: static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        run: |
          echo "Files analyzed: ${{ steps.review.outputs.files_analyzed }}"
          echo "Issues found: ${{ steps.review.outputs.issues_found }}"
          echo "Comment: ${{ steps.review.outputs.comment_url }}"
